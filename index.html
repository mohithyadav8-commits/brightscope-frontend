<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrightScope Global V2.1</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Search Area */
        .search-box { display: flex; gap: 15px; margin-bottom: 40px; }
        input { flex: 1; padding: 20px; background: var(--card); border: 1px solid var(--border); color: white; border-radius: 12px; outline: none; font-size: 16px; }
        button { padding: 0 40px; background: var(--accent); color: #0f172a; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* Orbital Loader with Countdown */
        #loader { display: none; text-align: center; padding: 80px 0; }
        .orbital { position: relative; width: 100px; height: 100px; margin: 0 auto 30px; }
        .ring { position: absolute; width: 100%; height: 100%; border: 4px solid transparent; border-top-color: var(--accent); border-radius: 50%; animation: spin 1.5s linear infinite; }
        .ring.inner { width: 70%; height: 70%; top: 15%; left: 15%; border-top-color: #f472b6; animation-direction: reverse; }
        .countdown { font-size: 24px; font-weight: bold; color: var(--accent); margin-top: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Data Grid Upgrade */
        .data-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; }
        .box span { display: block; font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; font-weight: 900; }
        .box strong { font-size: 16px; word-break: break-word; }

        #results { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .badge { background: #064e3b; color: #34d399; padding: 8px 16px; border-radius: 30px; font-weight: bold; font-size: 13px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .label { color: var(--accent); font-size: 12px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BrightScope <strong>Global V2.1</strong></h1>
        <div class="search-box">
            <input type="text" id="companyInput" placeholder="Enter Company Name or URL...">
            <button onclick="runEngine()">SCAN TARGET</button>
        </div>

        <div id="loader">
            <div class="orbital"><div class="ring"></div><div class="ring inner"></div></div>
            <div class="pulse-text">PENETRATING GLOBAL SERVERS...</div>
            <div class="countdown" id="timer">15s</div>
        </div>

        <div id="results">
            <div class="header">
                <h2 id="rName" style="margin:0">Company</h2>
                <div style="display:flex; gap:10px;">
                    <div class="badge" id="rConfidence">9/10 Confidence</div>
                    <button onclick="copyToExcel()" style="padding:10px 20px; background:#16a34a; color:white; font-size:13px;">📋 Copy Row</button>
                </div>
            </div>

            <div class="data-grid">
                <div class="box"><span>Sector</span><strong id="rSector">-</strong></div>
                <div class="box"><span>Country</span><strong id="rCountry">-</strong></div>
                <div class="box"><span>Established</span><strong id="rEst">-</strong></div>
                <div class="box"><span>Employees</span><strong id="rEmp">-</strong></div>
                <div class="box"><span>Revenue</span><strong id="rRev">-</strong></div>
            </div>

            <div class="card" style="border-top: 4px solid var(--accent);">
                <div class="label">Primary Pitch</div>
                <div id="rService" style="font-size:20px; font-weight:bold; margin-bottom:20px;"></div>
                <div class="label">Strategic Rationale</div>
                <div id="rReason"></div>
            </div>

            <div class="card">
                <div class="label">Recommended Outreach</div>
                <div style="background:rgba(0,0,0,0.2); padding:20px; border-radius:8px; font-style:italic;" id="rBody"></div>
            </div>
        </div>
    </div>

    <script>
        let timerInterval;

        async function runEngine() {
            const input = document.getElementById('companyInput').value;
            if(!input) return;

            document.getElementById('loader').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            
            // Start Countdown
            let timeLeft = 15;
            document.getElementById('timer').innerText = timeLeft + "s";
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) clearInterval(timerInterval);
            }, 1000);

            try {
                const response = await fetch('https://brightscope-backend.onrender.com/analyse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ company_name: input })
                });
                
                const data = JSON.parse(await response.json());
                clearInterval(timerInterval);

                document.getElementById('rName').innerText = data.company_display_name;
                document.getElementById('rConfidence').innerText = "Accuracy: " + data.confidence_score;
                document.getElementById('rSector').innerText = data.sector;
                document.getElementById('rCountry').innerText = data.country;
                document.getElementById('rEst').innerText = data.established;
                document.getElementById('rEmp').innerText = data.employees;
                document.getElementById('rRev').innerText = data.revenue;
                document.getElementById('rService').innerText = data.service;
                document.getElementById('rReason').innerText = data.reason;
                document.getElementById('rBody').innerText = data.email_body;

                document.getElementById('loader').style.display = 'none';
                document.getElementById('results').style.display = 'block';
            } catch (e) {
                clearInterval(timerInterval);
                alert("Scan Interrupted. Check Render Logs.");
                document.getElementById('loader').style.display = 'none';
            }
        }

        function copyToExcel() {
            const row = `${document.getElementById('rName').innerText}\t${document.getElementById('rSector').innerText}\t${document.getElementById('rCountry').innerText}\t${document.getElementById('rRev').innerText}\t${document.getElementById('rService').innerText}`;
            navigator.clipboard.writeText(row);
            alert("Row Copied for Excel!");
        }
    </script>
</body>
</html>
